<!-- hexo-inject:begin --><!-- hexo-inject:end --><figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">import</span> win32gui</div><div class="line"><span class="keyword">import</span> win32con</div><div class="line"><span class="keyword">import</span> win32clipboard <span class="keyword">as</span> w</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">def</span> <span class="title">getText</span><span class="params">()</span>:</span></div><div class="line">    <span class="string">"""获取剪贴板文本"""</span></div><div class="line">    w.OpenClipboard()</div><div class="line">    d = w.GetClipboardData(win32con.CF_UNICODETEXT)</div><div class="line">    w.CloseClipboard()</div><div class="line">    <span class="keyword">return</span> d</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">def</span> <span class="title">setText</span><span class="params">(aString)</span>:</span></div><div class="line">    <span class="string">"""设置剪贴板文本"""</span></div><div class="line">    w.OpenClipboard()</div><div class="line">    w.EmptyClipboard()</div><div class="line">    w.SetClipboardData(win32con.CF_UNICODETEXT, aString)</div><div class="line">    w.CloseClipboard()</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">def</span> <span class="title">send_qq</span><span class="params">(to_who, msg)</span>:</span></div><div class="line">    <span class="string">"""发送qq消息</span></div><div class="line">    to_who：qq消息接收人</div><div class="line">    msg：需要发送的消息</div><div class="line">    """</div><div class="line">    <span class="comment"># 将消息写到剪贴板</span></div><div class="line">    setText(msg)</div><div class="line">    <span class="comment"># 获取qq窗口句柄</span></div><div class="line">    qq = win32gui.FindWindow(<span class="keyword">None</span>, to_who)</div><div class="line">    <span class="comment"># 投递剪贴板消息到QQ窗体</span></div><div class="line">    win32gui.SendMessage(qq, <span class="number">258</span>, <span class="number">22</span>, <span class="number">2080193</span>)</div><div class="line">    win32gui.SendMessage(qq, <span class="number">770</span>, <span class="number">0</span>, <span class="number">0</span>)</div><div class="line">    <span class="comment"># 模拟按下回车键</span></div><div class="line">    win32gui.SendMessage(qq, win32con.WM_KEYDOWN, win32con.VK_RETURN, <span class="number">0</span>)</div><div class="line">    win32gui.SendMessage(qq, win32con.WM_KEYUP, win32con.VK_RETURN, <span class="number">0</span>)</div><div class="line"></div><div class="line"></div><div class="line"><span class="comment"># 测试</span></div><div class="line">to_who=<span class="string">'xxx'</span></div><div class="line">msg=<span class="string">'这是测试消息'</span></div><div class="line">send_qq(to_who, msg)</div></pre></td>
