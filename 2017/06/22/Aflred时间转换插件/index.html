       fb.addItem(**kwargsOfSeconds)</div><div class="line"></div><div class="line">        kwargsOfMilliseconds = &#123;</div><div class="line">            <span class="string">'title'</span>: str(time.time() * <span class="number">1000</span>),</div><div class="line">            <span class="string">'subtitle'</span>: <span class="string">u'当前日期'</span>,</div><div class="line">            <span class="string">'arg'</span>: <span class="string">'%s\n%s'</span> % (str(time.time() * <span class="number">1000</span>), <span class="string">u'当前日期'</span>)</div><div class="line">        &#125;</div><div class="line">        fb.addItem(**kwargsOfMilliseconds)</div><div class="line">       </div><div class="line">    <span class="keyword">elif</span> long(now) &gt; <span class="number">0</span>:</div><div class="line">        timeWithNomal = datetime.datetime.fromtimestamp(now).strftime(<span class="string">'%Y-%m-%d %H:%M:%S'</span>)</div><div class="line">        timeWithMilliseconds = datetime.datetime.fromtimestamp(now).strftime(<span class="string">'%Y-%m-%d %H:%M:%S.%f'</span>)</div><div class="line"></div><div class="line">        title = timeWithMilliseconds</div><div class="line">        subtitle = <span class="string">u'毫秒时间'</span></div><div class="line">        kwargsOfMilliseconds = &#123;</div><div class="line">            <span class="string">'title'</span>: title,</div><div class="line">            <span class="string">'subtitle'</span>: subtitle,</div><div class="line">            <span class="string">'arg'</span>: <span class="string">'%s\n%s'</span> % (title, subtitle)</div><div class="line">        &#125;</div><div class="line">        fb.addItem(**kwargsOfMilliseconds)</div><div class="line"></div><div class="line">        title = timeWithNomal</div><div class="line">        subtitle = <span class="string">u'标准时间'</span></div><div class="line">        kwargsOfNormal = &#123;</div><div class="line">            <span class="string">'title'</span>: title
